<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOOM MASTER V.29</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root { --blue: #00d2ff; --gold: #ffd700; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Syncopate', sans-serif; overflow: hidden; height: 100vh; }

        /* UI SUPERIORE */
        #header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 25px; z-index: 100; }
        .bal-container { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 20px; border: 1px solid var(--blue); box-shadow: 0 0 15px rgba(0,210,255,0.3); }
        #bal { font-size: 20px; font-weight: 900; color: var(--blue); }

        /* IL MOTORE 3D */
        #canvas-container { position: absolute; width: 100%; height: 100%; z-index: 1; }

        /* IL TASTONE MASTER */
        #ui-layer { position: absolute; bottom: 120px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .main-btn { 
            width: 85%; height: 90px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); border: none; 
            border-radius: 25px; color: #000; font-weight: 900; font-size: 24px; text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(0,210,255,0.5); transform: translateY(0); transition: transform 0.1s;
        }
        .main-btn:active { transform: scale(0.92) translateY(5px); box-shadow: 0 5px 15px rgba(0,210,255,0.3); }

        /* WIDGETS DOPO IL CRAFT */
        #farm-ui { display: none; width: 90%; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .w-box { background: rgba(20,20,20,0.8); border: 1px solid #333; padding: 15px; border-radius: 15px; text-align: center; backdrop-filter: blur(10px); }
        .w-box span { font-size: 9px; color: #666; display: block; margin-bottom: 5px; }

        #nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 20px 0 35px; background: #0a0a0a; z-index: 100; border-radius: 30px 30px 0 0; }
    </style>
</head>
<body>

    <div id="header">
        <div style="font-weight: 900;">ZOOM.V29</div>
        <div class="bal-container">🪐 <span id="bal">1100</span></div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="status-msg" style="margin-bottom: 15px; font-size: 12px; letter-spacing: 3px; color: var(--blue);">CRAFTING READY...</div>
        <button class="main-btn" id="tapper" onclick="handleTap()">Start Crafting</button>
        
        <div id="farm-ui">
            <div class="w-box"><span>FARM</span><b id="rate">0</b></div>
            <div class="w-box" onclick="location.reload()"><span>BURN</span><b style="color:red">15%</b></div>
            <div class="w-box"><span>SELL</span><b style="color:cyan">MARKET</b></div>
        </div>
    </div>

    <div id="nav">
        <div style="color:var(--blue)">⚒️ LAB</div>
        <div style="color:#444">🪐 PLANETS</div>
        <div style="color:#444">💎 SHOP</div>
    </div>

    <script>
        let balance = 1100;
        let taps = 0;
        let isDone = false;

        function handleTap() {
            if (balance <= 0 || isDone) return;
            
            balance--;
            taps++;
            document.getElementById('bal').innerText = balance;

            // 1. ANIMAZIONE TASTO & PIANETA (Input Feedback)
            gsap.to(planet.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.1, yoyo: true, repeat: 1 });
            gsap.to(planet.rotation, { y: planet.rotation.y + 0.5, duration: 0.2 });

            // 2. LOGICA PROGRESSIVA
            if (taps >= 20) {
                finalize();
            } else {
                document.getElementById('status-msg').innerText = `FORGING... ${taps}/20`;
            }
        }

        function finalize() {
            isDone = true;
            document.getElementById('tapper').style.display = "none";
            document.getElementById('farm-ui').style.display = "grid";
            document.getElementById('status-msg').innerText = "RARE PLANET ACQUIRED";
            
            // Effetto Reveal
            planet.material.wireframe = false;
            planet.material.color.setHex(0x00d2ff);
            gsap.from(planet.scale, { x: 5, y: 5, z: 5, duration: 0.5, ease: "expo.out" });
            
            // Start Farm
            setInterval(() => {
                balance += 0.05;
                document.getElementById('bal').innerText = Math.floor(balance);
            }, 100);
        }

        // --- 3D ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 2, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x111111));

        const geometry = new THREE.SphereGeometry(1.5, 32, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0x333333, wireframe: true });
        const planet = new THREE.Mesh(geometry, material);
        scene.add(planet);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            planet.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
