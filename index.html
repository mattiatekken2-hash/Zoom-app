<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZOOM MASTER V.29</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --main: #00ffcc; --gold: #ffd700; --panel: rgba(10, 10, 10, 0.95); }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; user-select: none; }
        
        /* HEADER STATS */
        #header { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .stat { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--main); font-weight: bold; font-size: 14px; backdrop-filter: blur(10px); }

        /* SEASON CIRCLE */
        #season-box { position: absolute; top: 70px; right: 20px; text-align: center; z-index: 10; }
        .c-bar { width: 45px; height: 45px; border: 3px solid #222; border-top: 3px solid var(--main); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

        /* LIVE FEED (FOMO) */
        #feed { position: absolute; bottom: 140px; width: 100%; text-align: center; color: var(--main); font-size: 11px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; z-index: 5; }

        /* MAIN 3D CONTAINER */
        #canvas-container { width: 100vw; height: 100vh; position: fixed; top: 0; }

        /* CONTROLS */
        #footer { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 10px; }
        .btn-main { background: var(--main); color: #000; border: none; padding: 18px 60px; border-radius: 40px; font-weight: 900; font-size: 20px; box-shadow: 0 0 30px rgba(0,255,204,0.4); text-transform: uppercase; }
        .btn-main:active { transform: scale(0.92); }

        /* MODALS (SHOP, FLIP) */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 88%; background: var(--panel); border: 1px solid var(--main); border-radius: 24px; padding: 20px; z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .active { display: block; animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: translate(-50%, -40%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        
        .wallet-card { background: #000; border: 1px dashed var(--main); padding: 12px; margin: 15px 0; border-radius: 12px; font-size: 10px; word-break: break-all; }
        .btn-sec { background: transparent; border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 12px; margin: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat" onclick="openM('shop-m')">🛒 SHOP</div>
        <div class="stat">🪐 <span id="bal">1000</span> $ZOOM</div>
        <div class="stat" onclick="openM('flip-m')">🎲 FLIP</div>
    </div>

    <div id="season-box">
        <div class="c-bar">S1/6</div>
        <div style="font-size: 8px; margin-top: 4px;">SEASON</div>
    </div>

    <div id="canvas-container"></div>

    <div id="feed">CARICAMENTO DATI LIVE...</div>

    <div id="footer">
        <button class="btn-main" onclick="tap()">TAP TO CRAFT</button>
        <div style="font-size: 10px; color: #555;">ZOOM PROTOCOL V.29</div>
    </div>

    <div id="shop-m" class="modal">
        <h2 style="margin:0; color:var(--main)">ZOOM SHOP</h2>
        <p style="font-size:14px;">Acquista <b>IL SOLE</b> (10 TON)<br><small>Rendimento Max + Unicità</small></p>
        <div class="wallet-card">UQCbU2lE4-xTcX2cjX75Uq4LQskpL-Xm71yLrA58QxytkgzS</div>
        <button class="btn-sec" style="border-color:var(--main)" onclick="copyW()">COPY ADDRESS</button>
        <p style="font-size:10px; color:#ff4444;">⚠️ INVIA SOLO TON (RETE TON)</p>
        <button class="btn-sec" onclick="closeM()">CHIUDI</button>
    </div>

    <div id="flip-m" class="modal">
        <h2 style="margin:0;">COIN FLIP</h2>
        <p>Scommetti 500 $ZOOM</p>
        <div id="coin-res" style="font-size:40px; margin:20px;">🪐</div>
        <button class="btn-main" style="font-size:14px; padding:12px 30px;" onclick="runFlip()">SCOMMETTI</button><br><br>
        <button class="btn-sec" onclick="closeM()">CHIUDI</button>
    </div>

    <script>
        let balance = 1000;
        const messages = ["• IL SOLE ACQUISTATO (18/20) •", "• NUOVO GOLD PIANETA GENERATO •", "• UTENTE X HA VINTO IL FLIP •", "• WEALTH RANK AGGIORNATO •"];
        
        function tap() {
            if(balance <= 0) return;
            balance--;
            document.getElementById('bal').innerText = balance;
            planet.scale.set(1.1, 1.1, 1.1);
            setTimeout(() => planet.scale.set(1, 1, 1), 100);
        }

        function openM(id) { document.getElementById(id).classList.add('active'); }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function copyW() { navigator.clipboard.writeText("UQCbU2lE4-xTcX2cjX75Uq4LQskpL-Xm71yLrA58QxytkgzS"); alert("Copiato!"); }

        function runFlip() {
            if(balance < 500) return;
            balance -= 500;
            const win = Math.random() < 0.45;
            document.getElementById('coin-res').innerText = "🌀";
            setTimeout(() => {
                if(win) { balance += 1000; document.getElementById('coin-res').innerText = "💎"; alert("VINTO!"); }
                else { document.getElementById('coin-res').innerText = "💀"; alert("PERSO!"); }
                document.getElementById('bal').innerText = balance;
            }, 800);
        }

        setInterval(() => {
            document.getElementById('feed').innerText = messages[Math.floor(Math.random()*messages.length)];
        }, 4000);

        // ENGINE 3D OTTIMIZZATO
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Luci
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Pianeta
        const geometry = new THREE.IcosahedronGeometry(1.5, 3); // Più leggero per mobile
        const material = new THREE.MeshPhongMaterial({ color: 0x00ffcc, wireframe: true, emissive: 0x002211 });
        const planet = new THREE.Mesh(geometry, material);
        scene.add(planet);

        camera.position.z = 4;

        function animate() {
            requestAnimationFrame(animate);
            planet.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
