<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOOM MASTER V.33 - DEFINITIVE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --neon: #00f2fe; --gold: #ffd700; --bg: #000; --card: rgba(15,15,15,0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; color: white; }
        body { background: var(--bg); overflow: hidden; height: 100vh; }

        /* HEADER & SEASON BAR (Specifica 5) */
        #header { position: absolute; top: 0; width: 100%; padding: 25px; z-index: 100; pointer-events: none; }
        .top-row { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .balance-box { background: var(--card); border: 1px solid var(--neon); padding: 10px 20px; border-radius: 30px; font-weight: 900; font-size: 20px; box-shadow: 0 0 15px rgba(0,242,254,0.2); }
        
        .season-container { width: 100%; margin-top: 15px; pointer-events: auto; }
        .season-label { font-size: 9px; font-weight: 900; letter-spacing: 2px; color: #555; margin-bottom: 5px; }
        .season-bar { width: 100%; height: 4px; background: #111; border-radius: 2px; overflow: hidden; }
        .season-fill { width: 16.6%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* RANK WIDGETS (Specifica 5) */
        #ranks { position: absolute; top: 120px; left: 25px; z-index: 50; display: flex; gap: 10px; }
        .rank-tag { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 10px; font-size: 9px; font-weight: 800; border: 1px solid #222; }

        /* 3D STAGE */
        #stage { position: absolute; top: 0; width: 100%; height: 100%; z-index: 1; }

        /* UI BOTTOM */
        #controls { position: absolute; bottom: 0; width: 100%; padding: 40px 25px 50px; z-index: 10; background: linear-gradient(0deg, #000 80%, transparent); display: flex; flex-direction: column; align-items: center; }
        
        .main-btn { 
            width: 100%; height: 90px; background: var(--neon); border: none; border-radius: 25px; 
            color: #000; font-weight: 900; font-size: 26px; text-transform: uppercase;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.4); transition: 0.1s;
        }
        .main-btn:active { transform: scale(0.93) translateY(6px); }

        #game-grid { display: none; width: 100%; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-widget { background: var(--card); border: 1px solid #222; padding: 18px 5px; border-radius: 22px; text-align: center; }
        .btn-widget span { font-size: 8px; color: #444; display: block; margin-bottom: 4px; font-weight: 900; }
        .btn-widget b { font-size: 14px; }

        /* WITHDRAW (Specifica 9) */
        .withdraw-btn { margin-top: 20px; font-size: 10px; color: var(--gold); border: 1px solid var(--gold); padding: 8px 20px; border-radius: 15px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="header">
        <div class="top-row">
            <div style="font-weight: 900; font-size: 24px;">ZOOM.</div>
            <div class="balance-box">🪐 <span id="bal">1100</span></div>
        </div>
        <div class="season-container">
            <div class="season-label">SEASON 1 OF 6</div>
            <div class="season-bar"><div class="season-fill"></div></div>
        </div>
    </div>

    <div id="ranks">
        <div class="rank-tag">WHALE: #1204</div>
        <div class="rank-tag" style="color:var(--gold)">WEALTH: TOP 5%</div>
    </div>

    <div id="stage"></div>

    <div id="controls">
        <div style="font-size: 10px; color: var(--neon); letter-spacing: 4px; margin-bottom: 20px; font-weight: 900;" id="status">LABORATORY READY</div>
        
        <button class="main-btn" id="tap-trigger">CRAFT</button>

        <div id="game-grid">
            <div class="btn-widget"><span>FARMING</span><b id="rate-val">+0/H</b></div>
            <div class="btn-widget" onclick="location.reload()"><span>BURN (15%)</span><b style="color:red">BURN</b></div>
            <div class="btn-widget"><span>MARKET</span><b style="color:var(--gold)">SELL</b></div>
        </div>

        <button class="withdraw-btn" onclick="alert('Withdraw available at end of Season 1. (Req: 10 TON Deposit)')">Withdraw</button>
        <div style="font-size: 8px; color: #222; margin-top: 15px;">UQCbU2lE4-xTcX2cjX75Uq4LQskpL-Xm71yLrA58QxytkgzS</div>
    </div>

    <script>
        let state = { bal: 1100, taps: 0, goal: 40, done: false };

        // --- 3D ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('stage').appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(5, 5, 5);
        scene.add(sun, new THREE.AmbientLight(0x111111));

        const planetGeo = new THREE.SphereGeometry(1.6, 64, 64);
        const planetMat = new THREE.MeshStandardMaterial({ 
            color: 0x050505, metalness: 1, roughness: 0.1, wireframe: true,
            emissive: 0x00f2fe, emissiveIntensity: 0.2
        });
        const planet = new THREE.Mesh(planetGeo, planetMat);
        scene.add(planet);

        camera.position.z = 5;

        // --- INPUT LOGIC ---
        const btn = document.getElementById('tap-trigger');
        const balUI = document.getElementById('bal');
        const statusUI = document.getElementById('status');

        function trigger() {
            if (state.done) return;
            state.bal--;
            state.taps++;
            balUI.innerText = state.bal;
            statusUI.innerText = `FORGING: ${state.taps}/${state.goal}`;

            // Fisica d'impatto
            gsap.fromTo(planet.scale, {x:1.4, y:1.4, z:1.4}, {x:1, y:1, z:1, duration: 0.2, ease: "back.out(2)"});
            planet.rotation.y += 0.5;
            planet.material.emissiveIntensity += 0.02;

            if (state.taps >= state.goal) finalize();
        }

        function finalize() {
            state.done = true;
            btn.style.display = "none";
            document.getElementById('game-grid').style.display = "grid";
            planet.material.wireframe = false;
            planet.material.color.setHex(0x00f2fe);
            planet.material.emissiveIntensity = 0.6;
            document.getElementById('rate-val').innerText = "+25/H";
            statusUI.innerText = "MINER ONLINE";
            gsap.to(planet.scale, {x:2.1, y:2.1, z:2.1, duration: 1.5, ease: "elastic.out(1, 0.3)"});
            
            // Farming Loop
            setInterval(() => { state.bal++; balUI.innerText = Math.floor(state.bal); }, 3600);
        }

        btn.addEventListener('touchstart', (e) => { e.preventDefault(); trigger(); });
        btn.addEventListener('mousedown', trigger);

        function animate() {
            requestAnimationFrame(animate);
            planet.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
