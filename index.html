<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOOM MASTER ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --blue: #00f2fe; --gold: #ffd700; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; position: fixed; width: 100%; }

        /* UI STRUTTURALE */
        #header { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 25px; z-index: 100; }
        .bal-box { background: rgba(255,255,255,0.07); padding: 12px 20px; border-radius: 20px; border: 1px solid var(--blue); backdrop-filter: blur(10px); }
        
        #canvas-container { position: absolute; width: 100%; height: 60%; top: 0; z-index: 1; }

        /* PANNELLO DI CONTROLLO (Specifica 3) */
        #bottom-panel { position: absolute; bottom: 0; width: 100%; height: 45%; background: #0a0a0a; border-top: 2px solid #1a1a1a; border-radius: 40px 40px 0 0; z-index: 10; padding: 30px 20px; }

        /* IL TASTO CHE "PENSA" */
        .master-btn { 
            width: 100%; height: 100px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); 
            border: none; border-radius: 30px; color: #000; font-weight: 900; font-size: 24px; 
            box-shadow: 0 15px 45px rgba(0, 242, 254, 0.4); text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="header">
        <div style="font-weight: 900; font-size: 22px;">ZOOM<span>.</span></div>
        <div class="bal-box">🪐 <span id="bal">1100</span></div>
    </div>

    <div id="canvas-container"></div>

    <div id="bottom-panel">
        <div id="status-label" style="text-align:center; margin-bottom: 15px; font-weight: 800; color: #444;">LABORATORY READY</div>
        <button class="master-btn" id="tap-trigger">START CRAFTING</button>
        
        <div id="farm-ui" style="display:none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px;">
            <div style="background:#111; padding:15px; border-radius:15px; text-align:center;"><span>FARM</span><br><b id="rate-ui">+0</b></div>
            <div style="background:#111; padding:15px; border-radius:15px; text-align:center;" onclick="location.reload()"><span>BURN</span><br><b style="color:red">15%</b></div>
            <div style="background:#111; padding:15px; border-radius:15px; text-align:center;"><span>SELL</span><br><b style="color:var(--gold)">LIST</b></div>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE INIZIALE (Cosa comporta ogni variabile)
        let balance = 1100; // Il tuo saldo $ZOOM
        let tapsDone = 0;   // Progressi attuali
        let reqTaps = 0;    // Sarà deciso dall'RNG
        let currentRarity = null;

        const rarities = [
            { name: "BASIC", taps: 25, color: 0x777777, rate: 2 },
            { name: "RARE", taps: 60, color: 0x00f2fe, r: 15 },
            { name: "GOLD", taps: 200, color: 0xffd700, r: 100 }
        ];

        const btn = document.getElementById('tap-trigger');

        // IL PENSIERO DEL TAP
        function processTap() {
            if (balance <= 0) return;

            // Se è il primo tap, l'IA sceglie la rarità (Specifica 2)
            if (tapsDone === 0) {
                currentRarity = rarities[Math.floor(Math.random() * rarities.length)];
                reqTaps = currentRarity.taps;
            }

            balance--;
            tapsDone++;
            document.getElementById('bal').innerText = Math.floor(balance);
            document.getElementById('status-label').innerText = `CONSTRUCTING: ${tapsDone} / ${reqTaps}`;

            // FEEDBACK FISICO (GSAP - Comportamento Impatto)
            gsap.fromTo(planet.scale, {x: 1.5, y: 1.5, z: 1.5}, {x: 1.2, y: 1.2, z: 1.2, duration: 0.1});
            planet.rotation.y += 0.5;

            // Controllo completamento
            if (tapsDone >= reqTaps) finalize();
        }

        btn.addEventListener('touchstart', (e) => { e.preventDefault(); processTap(); });

        function finalize() {
            btn.style.display = "none";
            document.getElementById('farm-ui').style.display = "grid";
            document.getElementById('status-label').innerText = currentRarity.name + " PLANET READY";
            
            // Cambio materiale (Il pianeta si materializza)
            planet.material.wireframe = false;
            planet.material.color.setHex(currentRarity.color);
            gsap.to(planet.scale, {x: 2, y: 2, z: 2, duration: 1, ease: "elastic.out"});
        }

        // --- MOTORE 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const planet = new THREE.Mesh(
            new THREE.SphereGeometry(1.5, 32, 32),
            new THREE.MeshPhongMaterial({ color: 0x222222, wireframe: true })
        );
        scene.add(planet);
        scene.add(new THREE.AmbientLight(0x404040));
        const light = new THREE.PointLight(0xffffff, 2);
        light.position.set(5,5,5);
        scene.add(light);
        camera.position.z = 5;

        function animate() { requestAnimationFrame(animate); planet.rotation.y += 0.005; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
