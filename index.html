<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZOOM - Master App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --main-color: #00ffcc; --gold: #ffd700; --danger: #ff4444; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* UI SUPERIORE */
        #top-ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--main-color); backdrop-filter: blur(10px); }

        /* CIRCULAR SEASON PROGRESS (3 MESI) */
        #season-circle { position: absolute; top: 65px; right: 20px; width: 50px; height: 50px; }
        .circle-svg { transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #333; stroke-width: 4; }
        .circle-bar { fill: none; stroke: var(--main-color); stroke-width: 4; stroke-dasharray: 126; stroke-dashoffset: 100; transition: 1s; }

        /* LIVE ACTIVITY FEED (SOTTO IL TASTO FARM) */
        #activity-feed { position: absolute; bottom: 135px; width: 100%; font-size: 11px; color: var(--main-color); text-align: center; height: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* CONTAINER 3D */
        #container { width: 100vw; height: 100vh; position: fixed; top: 0; z-index: 1; }

        /* CONTROLLI */
        #controls { position: absolute; bottom: 30px; width: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn-farm { background: var(--main-color); border: none; color: #000; padding: 18px 50px; border-radius: 40px; font-weight: bold; font-size: 20px; box-shadow: 0 0 25px var(--main-color); }
        
        /* MODALI (SHOP & COIN FLIP) */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #0a0a0a; border: 2px solid var(--main-color); border-radius: 25px; padding: 25px; z-index: 100; text-align: center; box-shadow: 0 0 50px rgba(0,255,204,0.3); }
        .wallet-display { background: #000; padding: 12px; border-radius: 12px; font-size: 10px; word-break: break-all; margin: 15px 0; border: 1px dashed var(--main-color); color: #fff; }
        .btn-action { background: transparent; border: 1px solid white; color: white; padding: 12px 25px; border-radius: 15px; margin: 5px; font-weight: bold; }

        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="top-ui">
        <div class="stat-box" onclick="toggleModal('shop')">🛒 SHOP</div>
        <div class="stat-box">🪐 <span id="balance">1000</span> $ZOOM</div>
        <div class="stat-box" onclick="toggleModal('flip')">🎲 FLIP</div>
    </div>

    <div id="season-circle">
        <svg class="circle-svg" width="50" height="50">
            <circle class="circle-bg" cx="25" cy="25" r="20"></circle>
            <circle class="circle-bar" cx="25" cy="25" r="20"></circle>
        </svg>
        <div style="position:absolute; top:16px; left:12px; font-size:9px; font-weight:bold;">S1/6</div>
    </div>

    <div id="container"></div>

    <div id="activity-feed">
        <div id="feed-text">IN ATTESA DI ATTIVITÀ...</div>
    </div>

    <div id="controls">
        <button class="btn-farm" id="farmBtn" onclick="handleTap()">TAP TO CRAFT</button>
        <div style="font-size: 11px; color: #777;">SISTEMA ZOOM V.29</div>
    </div>

    <div id="shop" class="modal">
        <h2 style="color:var(--main-color)">ZOOM SHOP</h2>
        <p>Acquista IL SOLE (10 TON)<br><span style="font-size:12px; color:var(--gold)">Rendimento Massimo Garantito</span></p>
        
        <div class="wallet-display" id="walletAddr">UQCbU2lE4-xTcX2cjX75Uq4LQskpL-Xm71yLrA58QxytkgzS</div>
        
        <button class="btn-action" style="background: var(--main-color); color: #000; border:none;" onclick="copyWallet()">COPY WALLET ADDR</button>
        
        <div style="color: var(--danger); font-size: 11px; margin-top: 15px; font-weight: bold;">
            ⚠️ TRANSACTION ALERT:<br>Invia solo TON. Altre valute andranno perse.
        </div>
        <br>
        <button class="btn-action" onclick="toggleModal('shop')">TORNA AL GIOCO</button>
    </div>

    <div id="flip" class="modal">
        <h2 style="color:var(--main-color)">QUANTUM FLIP</h2>
        <p>Scommetti 500 $ZOOM</p>
        <div id="coin-area" style="background: linear-gradient(45deg, #111, #222); height: 120px; display: flex; align-items: center; justify-content: center; margin: 20px; border-radius: 20px; border: 1px solid #333;">
            <div id="coin" style="font-size: 50px;">🪐</div>
        </div>
        <button class="btn-action" style="border-color:var(--main-color)" onclick="startFlip()">SCOMMETTI ORA</button>
        <button class="btn-action" onclick="toggleModal('flip')">CHIUDI</button>
    </div>

    <script>
        const DEV_WALLET = "UQCbU2lE4-xTcX2cjX75Uq4LQskpL-Xm71yLrA58QxytkgzS";
        let zoomBalance = 1000;
        
        const feedMessages = [
            "• Utente X ha attivato un Gold •",
            "• IL SOLE è stato acquistato! (18/20) •",
            "• Milestone 100 inviti raggiunta! •",
            "• Wealth Rank aggiornato •",
            "• Nuovo Pianeta Rare generato •"
        ];

        function handleTap() {
            if(zoomBalance <= 0) {
                alert("Saldo $ZOOM esaurito!");
                return;
            }
            zoomBalance--;
            document.getElementById('balance').innerText = zoomBalance;
            
            // Animazione rotazione rapida al Tap
            planet.rotation.y += 0.3;
            planet.scale.x = 1.1; // Pulsazione
            setTimeout(() => planet.scale.x = 1, 100);
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('active');
        }

        function copyWallet() {
            navigator.clipboard.writeText(DEV_WALLET);
            alert("Wallet ZOOM copiato! Invia i fondi e tieni lo screenshot.");
        }

        function startFlip() {
            if(zoomBalance < 500) { alert("Saldo insufficiente per il Flip!"); return; }
            
            const coin = document.getElementById('coin');
            coin.style.transition = "0.5s";
            coin.style.transform = "rotateY(720deg)";
            
            zoomBalance -= 500;
            document.getElementById('balance').innerText = zoomBalance;
            
            const win = Math.random() < 0.45; // 45% Win rate (nascosto)

            setTimeout(() => {
                coin.style.transform = "rotateY(0deg)";
                if(win) {
                    zoomBalance += 1000;
                    alert("SISTEMA ZOOM: Hai Vinto 1000 $ZOOM!");
                } else {
                    alert("SISTEMA ZOOM: Scommessa Persa.");
                }
                document.getElementById('balance').innerText = zoomBalance;
            }, 600);
        }

        // FEED CICLICO ATTIVITÀ
        let feedIdx = 0;
        setInterval(() => {
            feedIdx = (feedIdx + 1) % feedMessages.length;
            const text = document.getElementById('feed-text');
            text.style.opacity = 0;
            setTimeout(() => {
                text.innerText = feedMessages[feedIdx];
                text.style.opacity = 1;
            }, 500);
        }, 4000);

        // --- MOTORE 3D ZOOM ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        // Pianeta iniziale (Wireframe)
        const geometry = new THREE.SphereGeometry(1.6, 32, 32);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true });
        const planet = new THREE.Mesh(geometry, material);
        scene.add(planet);

        camera.position.z = 4;

        function animate() {
            requestAnimationFrame(animate);
            planet.rotation.y += 0.005;
            planet.rotation.x += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
