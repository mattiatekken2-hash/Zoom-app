<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOOM MASTER V.31 - NEON EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --neon: #00f2fe; --gold: #ffd700; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow: hidden; height: 100vh; }

        /* HEADER STATS */
        #ui-layer { position: absolute; top: 0; width: 100%; padding: 25px; z-index: 100; display: flex; justify-content: space-between; pointer-events: none; }
        .stat-pill { background: rgba(0,0,0,0.6); border: 1px solid var(--neon); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(10px); pointer-events: auto; box-shadow: 0 0 20px rgba(0,242,254,0.2); }
        #bal-val { font-size: 22px; font-weight: 900; letter-spacing: -1px; }

        /* 3D VIEW */
        #render-target { position: absolute; top: 0; width: 100%; height: 100%; z-index: 1; }

        /* CONTROLLI INFERIORI (Stile Video) */
        #bottom-sheet { position: absolute; bottom: 0; width: 100%; padding: 30px 20px 50px; z-index: 10; background: linear-gradient(0deg, #000 70%, transparent); display: flex; flex-direction: column; align-items: center; }
        
        .status-info { font-size: 10px; color: var(--neon); letter-spacing: 3px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon); }

        .btn-tap { 
            width: 100%; height: 90px; background: var(--neon); border: none; border-radius: 25px; 
            color: #000; font-weight: 900; font-size: 26px; text-transform: uppercase;
            box-shadow: 0 0 30px var(--neon); transition: 0.1s;
        }
        .btn-tap:active { transform: scale(0.92) translateY(5px); box-shadow: 0 0 10px var(--neon); }

        /* WIDGETS POST-CRAFT */
        #farm-grid { display: none; width: 100%; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .widget { background: rgba(20,20,20,0.8); border: 1px solid #333; padding: 15px; border-radius: 22px; text-align: center; backdrop-filter: blur(5px); }
        .widget span { font-size: 9px; color: #666; display: block; margin-bottom: 4px; font-weight: bold; }
        .widget b { font-size: 15px; color: #fff; }

        /* FEED LIVE */
        #feed { position: absolute; top: 90px; left: 25px; font-size: 10px; color: #555; z-index: 50; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div style="font-weight: 900; font-size: 24px;">ZOOM<span style="color:var(--neon)">.</span></div>
        <div class="stat-pill">🪐 <span id="bal-val">1100</span></div>
    </div>

    <div id="feed">LIVE: IL SOLE #19 GENERATO DA @USER_X</div>

    <div id="render-target"></div>

    <div id="bottom-sheet">
        <div class="status-info" id="status-txt">LABORATORY ACTIVE</div>
        
        <button class="btn-tap" id="tap-trigger">CRAFT</button>

        <div id="farm-grid">
            <div class="widget"><span>FARMING</span><b id="rate-ui">+0/H</b></div>
            <div class="widget" onclick="location.reload()"><span>BURN</span><b style="color:#ff3131">15%</b></div>
            <div class="widget"><span>SELL</span><b style="color:var(--gold)">MARKET</b></div>
        </div>

        <div style="margin-top: 25px; font-size: 9px; color: #333;">WALLET: UQCb...kgzS</div>
    </div>

    <script>
        // --- LOGICA DI STATO ---
        let state = { balance: 1100, taps: 0, goal: 45, isDone: false };

        // --- MOTORE 3D AVANZATO ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('render-target').appendChild(renderer.domElement);

        // Luci Neon
        const pLight = new THREE.PointLight(0x00f2fe, 5, 50);
        pLight.position.set(2, 3, 4);
        scene.add(pLight, new THREE.AmbientLight(0x111111));

        // Pianeta con Materiale Fisico (Riflessi metallici come nel video)
        const geometry = new THREE.SphereGeometry(1.6, 64, 64);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            metalness: 0.9, 
            roughness: 0.1,
            wireframe: true,
            emissive: 0x00f2fe,
            emissiveIntensity: 0.2
        });
        const planet = new THREE.Mesh(geometry, material);
        scene.add(planet);
        camera.position.z = 5;

        // --- SISTEMA DI INPUT ---
        const btn = document.getElementById('tap-trigger');
        const balUI = document.getElementById('bal-val');
        const statusUI = document.getElementById('status-txt');

        function doTap(e) {
            if (state.isDone) return;
            if (e) e.preventDefault();

            state.balance--;
            state.taps++;
            balUI.innerText = state.balance;
            statusUI.innerText = `FORGING: ${state.taps} / ${state.goal}`;

            // Effetto Rimbalzo (Feedback Fisico)
            gsap.fromTo(planet.scale, {x:1.3, y:1.3, z:1.3}, {x:1, y:1, z:1, duration: 0.2, ease: "back.out(3)"});
            planet.rotation.y += 0.4;
            
            // Aumento intensità luminosa
            planet.material.emissiveIntensity += 0.02;

            if (state.taps >= state.goal) finalize();
        }

        function finalize() {
            state.isDone = true;
            btn.style.display = "none";
            document.getElementById('farm-grid').style.display = "grid";
            
            // Evoluzione Visiva
            planet.material.wireframe = false;
            planet.material.color.setHex(0x00f2fe);
            planet.material.emissiveIntensity = 0.5;
            
            document.getElementById('rate-ui').innerText = "+18/H";
            statusUI.innerText = "PLANET STABILIZED";
            
            gsap.to(planet.scale, {x:2.2, y:2.2, z:2.2, duration: 1.5, ease: "elastic.out(1, 0.3)"});
        }

        // Eventi Touch/Mouse
        btn.addEventListener('touchstart', doTap);
        btn.addEventListener('mousedown', doTap);

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            planet.rotation.y += 0.005;
            planet.rotation.x += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
