<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOOM MASTER V.29</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --neon: #00f2fe; --gold: #ffd700; --epic: #b721ff; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow: hidden; height: 100vh; width: 100%; position: fixed; }

        /* HEADER E VALUTA (Specifica 1) */
        #ui-top { position: absolute; top: 0; width: 100%; padding: 25px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .valuta-box { background: rgba(255,255,255,0.05); border: 1px solid var(--neon); padding: 12px 20px; border-radius: 20px; backdrop-filter: blur(15px); pointer-events: auto; }
        #balance { font-size: 24px; font-weight: 900; }

        /* AREA 3D LAB (Specifica 2) */
        #canvas-container { position: absolute; top: 0; width: 100%; height: 65%; z-index: 1; }

        /* PANNELLO AZIONI (Specifica 3) */
        #ui-bottom { position: absolute; bottom: 0; width: 100%; height: 42%; background: #070707; border-top: 1px solid #1a1a1a; border-radius: 40px 40px 0 0; z-index: 10; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        
        /* IL TASTO IMPATTO */
        .tap-btn { 
            width: 100%; height: 95px; background: linear-gradient(135deg, var(--neon), #4facfe); 
            border: none; border-radius: 28px; color: #000; font-weight: 900; font-size: 26px; 
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3); transition: 0.05s; text-transform: uppercase;
        }
        .tap-btn:active { transform: scale(0.94) translateY(5px); }

        /* WIDGETS FARMING (Specifica 3) */
        #farm-ui { display: none; width: 100%; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; }
        .widget { background: #111; border: 1px solid #222; padding: 15px; border-radius: 22px; text-align: center; }
        .widget span { font-size: 10px; color: #555; display: block; margin-bottom: 5px; font-weight: bold; }
        .widget b { font-size: 16px; color: #fff; }

        /* LIVE FEED (Specifica 10) */
        #live-feed { position: absolute; top: 90px; left: 25px; font-size: 11px; color: var(--neon); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        
        .status-label { font-size: 11px; color: #444; font-weight: 800; letter-spacing: 3px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div style="font-weight: 900; font-size: 22px;">ZOOM<span>.</span></div>
        <div class="valuta-box">🪐 <span id="balance">1100</span></div>
    </div>

    <div id="live-feed">LIVE: IL SOLE GENERATO DA @USER72</div>

    <div id="canvas-container"></div>

    <div id="ui-bottom">
        <div class="status-label" id="status-txt">LABORATORY ACTIVE</div>
        
        <button class="tap-btn" id="main-trigger">CRAFT PLANET</button>

        <div id="farm-ui">
            <div class="widget"><span>FARMING</span><b id="rate-ui">+0/H</b></div>
            <div class="widget" onclick="location.reload()"><span>BURN</span><b style="color:#ff3e3e">15%</b></div>
            <div class="widget"><span>SELL</span><b style="color:var(--gold)">MARKET</b></div>
        </div>

        <div style="margin-top:auto; font-size: 10px; color:#222; text-align: center;">
            WALLET: UQCbU2lE4-xTcX2cjX75Uq4LQskpL-Xm71yLrA58QxytkgzS
        </div>
    </div>

    <script>
        // --- CONFIGURAZIONE CORE ---
        let state = {
            balance: 1100, taps: 0, goal: 0, 
            isCrafting: false, isDone: false, tier: null
        };

        const tiers = {
            BASIC: { name: "BASIC", color: 0x777777, req: 30, rate: 5, chance: 0.6 },
            RARE:  { name: "RARE",  color: 0x00f2fe, req: 75, rate: 25, chance: 0.25 },
            GOLD:  { name: "GOLD",  color: 0xffd700, req: 350, rate: 250, chance: 0.15 }
        };

        // --- MOTORE 3D (THREE.JS) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Luce fisica per riflessi (Specifica 2)
        const light = new THREE.PointLight(0xffffff, 2, 100);
        light.position.set(5, 5, 5);
        scene.add(light, new THREE.AmbientLight(0x222222));

        const geometry = new THREE.IcosahedronGeometry(1.5, 4);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x222222, wireframe: true, metalness: 0.7, roughness: 0.2 
        });
        const planet = new THREE.Mesh(geometry, material);
        scene.add(planet);
        camera.position.z = 5;

        // --- LOGICA DI INPUT (IL PENSIERO) ---
        const btn = document.getElementById('main-trigger');
        const balUI = document.getElementById('balance');
        const statusUI = document.getElementById('status-txt');

        function executeImpact() {
            if (state.balance < 1 || state.isDone) return;

            // Al primo tap l'AI decide il destino (RNG)
            if (!state.isCrafting) {
                state.isCrafting = true;
                const rng = Math.random();
                let cum = 0;
                for(let key in tiers) {
                    cum += tiers[key].chance;
                    if(rng <= cum) { state.tier = tiers[key]; break; }
                }
                state.goal = state.tier.req;
            }

            state.balance--;
            state.taps++;
            balUI.innerText = Math.floor(state.balance);
            statusUI.innerText = `FORGING ${state.tier.name}: ${state.taps}/${state.goal}`;

            // Feedback Visivo (Come nel video)
            gsap.fromTo(planet.scale, {x: 1.4, y: 1.4, z: 1.4}, {x: 1, y: 1, z: 1, duration: 0.2});
            planet.rotation.y += 0.4;
            
            // Materializzazione progressiva
            planet.material.opacity = 0.3 + (state.taps / state.goal * 0.7);

            if (state.taps >= state.goal) finalize();
        }

        function finalize() {
            state.isDone = true;
            btn.style.display = "none";
            document.getElementById('farm-ui').style.display = "grid";
            
            // Evoluzione Finale
            planet.material.wireframe = false;
            planet.material.color.setHex(state.tier.color);
            document.getElementById('rate-ui').innerText = `+${state.tier.rate}/H`;
            statusUI.innerText = state.tier.name + " PLANET ONLINE";
            statusUI.style.color = "#" + state.tier.color.toString(16);

            gsap.to(planet.scale, {x: 2.2, y: 2.2, z: 2.2, duration: 1.2, ease: "elastic.out(1, 0.3)"});
            
            // Farming Loop (Specifica 3)
            setInterval(() => {
                state.balance += (state.tier.rate / 3600);
                balUI.innerText = Math.floor(state.balance);
            }, 1000);
        }

        // Eventi
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); executeImpact(); });
        btn.addEventListener('mousedown', executeImpact);

        function animate() {
            requestAnimationFrame(animate);
            planet.rotation.y += (state.isDone ? 0.005 : 0.002);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
