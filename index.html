<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOOM MASTER V.36 - SLOT SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --neon: #00f2fe; --gold: #ffd700; --bg: #000; --card: rgba(20,20,20,0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); overflow: hidden; height: 100vh; }

        /* UI HEADER */
        #header { position: absolute; top: 0; width: 100%; padding: 25px; z-index: 100; display: flex; justify-content: space-between; }
        .bal-pill { background: var(--card); border: 1px solid var(--neon); padding: 10px 20px; border-radius: 30px; font-weight: 900; font-size: 20px; }

        /* AREA SLOTS (Specifica 4) */
        #slots-container { position: absolute; top: 100px; width: 100%; padding: 0 25px; z-index: 50; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .slot { min-width: 80px; height: 100px; background: rgba(255,255,255,0.03); border: 1px dashed #333; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .slot.occupied { border: 1px solid var(--neon); background: var(--card); }
        .slot-rarity { font-size: 8px; font-weight: 900; margin-top: 5px; }
        .buy-slot { border: 1px solid var(--gold); color: var(--gold); font-size: 24px; }

        /* 3D LAB */
        #lab-target { position: absolute; top: 0; width: 100%; height: 100%; z-index: 1; }

        /* CONTROLLI */
        #ui-bottom { position: absolute; bottom: 0; width: 100%; padding: 40px 25px 60px; z-index: 10; background: linear-gradient(0deg, #000 80%, transparent); display: flex; flex-direction: column; align-items: center; }
        
        .btn-craft { width: 100%; height: 85px; background: var(--neon); border: none; border-radius: 25px; color: #000; font-weight: 900; font-size: 24px; text-transform: uppercase; box-shadow: 0 0 25px rgba(0, 242, 254, 0.3); }
        .btn-craft:disabled { background: #222; color: #555; box-shadow: none; }
    </style>
</head>
<body>

    <div id="header">
        <div style="font-weight: 900; font-size: 24px;">ZOOM.</div>
        <div class="bal-pill">🪐 <span id="balance">1100</span></div>
    </div>

    <div id="slots-container">
        <div class="slot" id="slot-0"><span>EMPTY</span></div>
        <div class="slot" id="slot-1"><span>EMPTY</span></div>
        <div class="slot buy-slot" onclick="buySlot()">+</div>
    </div>

    <div id="lab-target"></div>

    <div id="ui-bottom">
        <div id="status-txt" style="font-size: 10px; color: var(--neon); letter-spacing: 3px; margin-bottom: 20px; font-weight: 800;">LAB READY</div>
        <button class="btn-craft" id="craft-btn">CRAFT PLANET</button>
        <div style="margin-top: 20px; font-size: 8px; color: #333;">WALLET: UQCb...kgzS</div>
    </div>

    <script>
        const tiers = [
            { name: "BASIC", color: 0x888888, rate: 10, prob: 0.6 },
            { name: "RARE", color: 0x4facfe, rate: 50, prob: 0.3 },
            { name: "GOLD", color: 0xffd700, rate: 500, prob: 0.1 }
        ];

        let state = {
            bal: 1100, taps: 0, goal: 25,
            slots: [null, null],
            totalSlots: 2,
            isCrafting: false
        };

        // --- 3D ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('lab-target').appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 2);
        light.position.set(5, 5, 5);
        scene.add(light, new THREE.AmbientLight(0x111111));

        const planet = new THREE.Mesh(
            new THREE.IcosahedronGeometry(1.5, 4),
            new THREE.MeshStandardMaterial({ color: 0x222222, wireframe: true, metalness: 0.8 })
        );
        scene.add(planet);
        camera.position.z = 5;

        // --- LOGICA CORE ---
        const btn = document.getElementById('craft-btn');
        const balUI = document.getElementById('balance');

        function doTap() {
            // Controllo Slot Liberi
            const freeSlot = state.slots.indexOf(null);
            if(freeSlot === -1) return alert("All slots full! Buy more or Burn one.");
            
            state.isCrafting = true;
            state.bal--;
            state.taps++;
            balUI.innerText = state.bal;
            document.getElementById('status-txt').innerText = `FORGING: ${state.taps}/${state.goal}`;

            gsap.fromTo(planet.scale, {x:1.3, y:1.3, z:1.3}, {x:1, y:1, z:1, duration: 0.1});
            planet.rotation.y += 0.4;

            if(state.taps >= state.goal) finalize(freeSlot);
        }

        function finalize(slotIndex) {
            // RNG Rarità
            const rand = Math.random();
            let cum = 0; let winTier;
            for(let t of tiers){ cum += t.prob; if(rand <= cum){ winTier = t; break; } }

            state.slots[slotIndex] = winTier;
            updateSlotsUI();

            // Animazione: Il pianeta "vola" nello slot
            gsap.to(planet.scale, {x:0, y:0, z:0, duration: 0.5, onComplete: resetLab});
        }

        function resetLab() {
            state.taps = 0;
            state.isCrafting = false;
            planet.scale.set(1,1,1);
            planet.material.wireframe = true;
            planet.material.color.setHex(0x222222);
            document.getElementById('status-txt').innerText = "LAB READY";
        }

        function updateSlotsUI() {
            state.slots.forEach((s, i) => {
                const el = document.getElementById(`slot-${i}`);
                if(s) {
                    el.classList.add('occupied');
                    el.innerHTML = `<div style="width:30px; height:30px; background:#${s.color.toString(16)}; border-radius:50%"></div><span class="slot-rarity" style="color:#${s.color.toString(16)}">${s.name}</span><span style="font-size:7px">+${s.rate}/H</span>`;
                }
            });
        }

        function buySlot() {
            alert("Send 0.25 TON to unlock new Slot.");
            // Logica per aggiungere nuovo slot (visiva)
            const newIdx = state.slots.length;
            state.slots.push(null);
            const container = document.getElementById('slots-container');
            const newSlot = document.createElement('div');
            newSlot.className = 'slot';
            newSlot.id = `slot-${newIdx}`;
            newSlot.innerHTML = '<span>EMPTY</span>';
            container.insertBefore(newSlot, container.lastElementChild);
        }

        // Farming Loop Globale
        setInterval(() => {
            let totalRate = 0;
            state.slots.forEach(s => { if(s) totalRate += s.rate; });
            if(totalRate > 0) {
                state.bal += (totalRate / 3600);
                balUI.innerText = Math.floor(state.bal);
            }
        }, 1000);

        btn.addEventListener('mousedown', doTap);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); doTap(); });

        function animate() {
            requestAnimationFrame(animate);
            planet.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
