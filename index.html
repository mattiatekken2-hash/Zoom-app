<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOOM MASTER V.29</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --blue: #3498db; --gold: #ffd700; --epic: #a335ee; --rare: #0070dd; --bg: #000; --panel: #0a0a0a; --green: #2ecc71; --red: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        #header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px; z-index: 100; align-items: center; }
        .balance-box { background: rgba(255,255,255,0.08); padding: 8px 15px; border-radius: 15px; border: 1px solid var(--blue); }

        #viewport { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-container { position: absolute; width: 100%; height: 100%; top: 0; z-index: -1; }

        #ui-center { text-align: center; z-index: 10; margin-top: 220px; }
        .progress-text { font-size: 12px; color: var(--blue); margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        
        #farm-widgets { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; margin-top: 250px; z-index: 10; }
        .widget { background: var(--panel); padding: 12px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .widget span { display: block; font-size: 10px; color: #666; margin-bottom: 5px; }
        .btn-action { margin-top: 8px; padding: 5px; border-radius: 8px; border: none; font-size: 10px; font-weight: bold; width: 100%; }

        .btn-craft { background: var(--blue); color: #000; border: none; padding: 20px 50px; border-radius: 50px; font-weight: 900; font-size: 18px; box-shadow: 0 5px 20px rgba(52,152,219,0.4); }
        
        #nav-bottom { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0 35px; background: var(--panel); border-radius: 30px 30px 0 0; z-index: 100; }
        .nav-link { display: flex; flex-direction: column; align-items: center; color: #444; font-size: 10px; }
    </style>
</head>
<body>

    <div id="header">
        <div style="font-weight: 800; letter-spacing: 1px;">🪐 ZOOM<span>FORGE</span></div>
        <div class="balance-box">⚡ <span id="bal">1000</span> $ZOOM</div>
    </div>

    <div id="viewport">
        <div id="canvas-container"></div>

        <div id="ui-center">
            <div id="progress-info" class="progress-text">READY TO FORGE</div>
            <div id="rarity-tag" style="font-weight: 900; font-size: 24px; margin-bottom: 10px;"></div>
            <button class="btn-craft" id="main-btn" onclick="handleTap()">⚒️ START CRAFTING</button>
        </div>

        <div id="farm-widgets">
            <div class="widget"><span>FARM /H</span><b id="farm-rate">0</b></div>
            <div class="widget"><span>BURN</span><button class="btn-action" style="color:var(--red)" onclick="location.reload()">15%</button></div>
            <div class="widget"><span>MARKET</span><button class="btn-action" style="color:var(--green)">SELL</button></div>
        </div>
    </div>

    <nav id="nav-bottom">
        <div class="nav-link" style="color:white"><i>⚒️</i>LAB</div>
        <div class="nav-link"><i>🪐</i>PLANETS</div>
        <div class="nav-link"><i>💎</i>SHOP</div>
        <div class="nav-link"><i>🏆</i>RANKS</div>
    </nav>

    <script>
        let balance = 1000;
        let tapsDone = 0;
        let requiredTaps = 0;
        let currentRarity = null;
        let farmRate = 0;

        // 1. Definiamo i costi e rendimenti per rarità
        const rarityConfig = [
            { name: "BASIC", chance: 0.60, taps: 20, rate: 2, color: 0x777777 },
            { name: "RARE", chance: 0.25, taps: 50, rate: 10, color: 0x0070dd },
            { name: "EPIC", chance: 0.10, taps: 100, rate: 25, color: 0xa335ee },
            { name: "GOLD", chance: 0.05, taps: 250, rate: 100, color: 0xffd700 }
        ];

        // 2. Il sistema sceglie la rarità all'inizio del primo tap
        function initRarity() {
            const rng = Math.random();
            let cumulative = 0;
            for (let config of rarityConfig) {
                cumulative += config.chance;
                if (rng <= cumulative) {
                    currentRarity = config;
                    requiredTaps = config.taps;
                    break;
                }
            }
        }

        function handleTap() {
            if (balance <= 0) return;
            if (!currentRarity) initRarity();
            
            balance--;
            tapsDone++;
            document.getElementById('bal').innerText = balance;
            
            // Aggiorna UI Progress
            document.getElementById('progress-info').innerText = `FORGING: ${tapsDone} / ${requiredTaps}`;
            
            // Animazione 3D progressiva
            let scale = 1 + (tapsDone / requiredTaps) * 1.2;
            planet.scale.set(scale, scale, scale);
            planet.rotation.y += 0.2;

            if (tapsDone >= requiredTaps) {
                finalizePlanet();
            }
        }

        function finalizePlanet() {
            document.getElementById('ui-center').style.display = "none";
            document.getElementById('farm-widgets').style.display = "grid";
            
            document.getElementById('rarity-tag').innerText = currentRarity.name;
            document.getElementById('rarity-tag').style.color = '#' + currentRarity.color.toString(16);
            document.getElementById('farm-rate').innerText = "+" + currentRarity.rate;
            
            planet.material.color.setHex(currentRarity.color);
            planet.material.wireframe = false;
            
            // Start real-time farming
            setInterval(() => {
                balance += (currentRarity.rate / 3600);
                document.getElementById('bal').innerText = Math.floor(balance);
            }, 1000);
        }

        // --- ENGINE 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 1.5);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x222222));

        const geometry = new THREE.IcosahedronGeometry(1.2, 3);
        const material = new THREE.MeshPhongMaterial({ color: 0x333333, wireframe: true });
        const planet = new THREE.Mesh(geometry, material);
        scene.add(planet);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            planet.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
