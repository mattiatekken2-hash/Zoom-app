<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; bottom: 50px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        
        /* IL TASTO FISICO */
        .btn-impact {
            width: 80%; height: 80px; background: #00f2fe; border: none; border-radius: 20px;
            font-size: 20px; font-weight: 900; color: #000; cursor: pointer;
            box-shadow: 0 10px 0 #008fa0; transition: all 0.05s;
        }
        .btn-impact:active { transform: translateY(8px); box-shadow: 0 2px 0 #008fa0; }
        
        #stats { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 24px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="stats">🪐 <span id="bal">1100</span> $ZOOM</div>
    <div id="ui">
        <div id="label" style="color:#00f2fe; margin-bottom:10px; font-weight:bold;">LAB ATTIVO</div>
        <button class="btn-impact" id="target">CRAFTING...</button>
    </div>

    <script>
        let balance = 1100;
        let taps = 0;
        const goal = 20;

        // --- MOTORE 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.IcosahedronGeometry(1.5, 2);
        const mat = new THREE.MeshPhongMaterial({ color: 0x333333, wireframe: true });
        const planet = new THREE.Mesh(geo, mat);
        scene.add(planet);

        const light = new THREE.PointLight(0x00f2fe, 2, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        camera.position.z = 5;

        // --- LOGICA DI INPUT (Il "Pensiero") ---
        const btn = document.getElementById('target');
        
        function handleInteraction() {
            if (taps >= goal) return;

            balance--;
            taps++;
            document.getElementById('bal').innerText = balance;

            // 1. REAZIONE FISICA DEL PIANETA (Impulso)
            gsap.to(planet.scale, { x: 1.5, y: 1.5, z: 1.5, duration: 0.1, yoyo: true, repeat: 1, ease: "power2.out" });
            gsap.to(planet.rotation, { y: planet.rotation.y + 0.5, duration: 0.2 });

            if (taps >= goal) {
                // 2. PASSAGGIO DI STATO
                btn.innerText = "COMPLETATO!";
                btn.style.background = "#ffd700";
                planet.material.wireframe = false;
                planet.material.color.setHex(0xffd700);
                gsap.to(planet.scale, { x: 2, y: 2, z: 2, duration: 1, ease: "elastic.out(1, 0.3)" });
            }
        }

        btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleInteraction(); });
        btn.addEventListener('mousedown', handleInteraction);

        function animate() { requestAnimationFrame(animate); planet.rotation.x += 0.005; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
